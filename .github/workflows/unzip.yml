name: Unzip project code
on:
  push:
    paths:
      - 'project-code.zip'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unzip and commit
        run: |
          if [ -f project-code.zip ]; then
            unzip -o project-code.zip -d .
            rm project-code.zip
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Unzip project code" || true
            git push
          fi            
